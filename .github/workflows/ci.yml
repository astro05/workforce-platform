name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Build & Lint .NET API ─────────────────────────
  build-api:
    name: Build API (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/api/WorkforceAPI/WorkforceAPI.csproj

      - name: Build
        run: dotnet build src/api/WorkforceAPI/WorkforceAPI.csproj
          --no-restore
          --configuration Release

      - name: Run format check
        run: dotnet format src/api/WorkforceAPI/WorkforceAPI.csproj
          --verify-no-changes
          --no-restore
        continue-on-error: true

  # ── Job 2: Build Audit Worker ─────────────────────────────
  build-audit-worker:
    name: Build Audit Worker (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
          src/workers/audit-worker/AuditWorker/AuditWorker.csproj

      - name: Build
        run: dotnet build
          src/workers/audit-worker/AuditWorker/AuditWorker.csproj
          --no-restore
          --configuration Release

  # ── Job 3: Build Report Worker ────────────────────────────
  build-report-worker:
    name: Build Report Worker (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path:
            src/workers/report-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/workers/report-worker

      - name: Check for syntax errors
        run: node --check src/index.js
        working-directory: src/workers/report-worker

  # ── Job 4: Build & Lint Frontend ─────────────────────────
  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path:
            src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/frontend

      - name: TypeScript type check
        run: npx tsc --noEmit
        working-directory: src/frontend
        
      - name: Lint
        run: npm run lint
        working-directory: src/frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: src/frontend

  # ── Job 5: Docker Build ───────────────────────────────────
  docker-build:
    name: Docker Build (all images)
    runs-on: ubuntu-latest
    needs:
      - build-api
      - build-audit-worker
      - build-report-worker
      - build-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          echo "SA_PASSWORD=Workforce_Pass123" >> .env
          echo "MONGO_USER=mongo_user"         >> .env
          echo "MONGO_PASSWORD=mongo_pass"     >> .env
          echo "RABBITMQ_USER=admin"           >> .env
          echo "RABBITMQ_PASSWORD=admin123"    >> .env

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./src/api/WorkforceAPI
          file:    ./src/api/WorkforceAPI/Dockerfile
          push:    false
          tags:    workforce-api:latest

      - name: Build Audit Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/workers/audit-worker/AuditWorker
          file:    ./src/workers/audit-worker/AuditWorker/Dockerfile
          push:    false
          tags:    workforce-audit-worker:latest

      - name: Build Report Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./src/workers/report-worker
          file:    ./src/workers/report-worker/Dockerfile
          push:    false
          tags:    workforce-report-worker:latest

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file:    ./src/frontend/Dockerfile
          push:    false
          tags:    workforce-frontend:latest