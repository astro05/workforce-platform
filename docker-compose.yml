services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD:-Workforce_Pass123}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD:-Workforce_Pass123} -Q 'SELECT 1' -No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "mongo_user", "-p", "mongo_pass", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src/api/WorkforceAPI
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__SqlServer=Server=sqlserver,1433;Database=WorkforceDb;User Id=sa;Password=${SA_PASSWORD:-Workforce_Pass123};TrustServerCertificate=True
      - ConnectionStrings__Mongo=mongodb://mongo_user:mongo_pass@mongo:27017/?authSource=admin
      - ConnectionStrings__MongoDatabaseName=WorkforceDb
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=admin123
      - RabbitMQ__VirtualHost=/
    depends_on:
      sqlserver:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  audit-worker:
    build:
      context: ./src/workers/audit-worker/AuditWorker
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__Mongo=mongodb://mongo_user:mongo_pass@mongo:27017/?authSource=admin
      - ConnectionStrings__MongoDatabaseName=WorkforceDb
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__Username=admin
      - RabbitMQ__Password=admin123
      - RabbitMQ__VirtualHost=/
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  report-worker:
    build:
      context: ./src/workers/report-worker
      dockerfile: Dockerfile
    environment:
      - MSSQL_URL=mssql://sa:${SA_PASSWORD:-Workforce_Pass123}@sqlserver:1433/WorkforceDb
      - MONGO_URL=mongodb://mongo_user:mongo_pass@mongo:27017/?authSource=admin
      - MONGO_DB_NAME=WorkforceDb
    depends_on:
      sqlserver:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  sqlserver_data:
  mongo_data:
  rabbitmq_data: